<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード検証</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --primary-color: #2c3e50;
            --primary-light: #34495e;
            --accent-color: #3498db;
            --accent-hover: #2980b9;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --text-light: #bdc3c7;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --border-light: #e1e8ed;
            --border-medium: #d5dbdb;
            --shadow-light: 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-medium: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-strong: 0 8px 25px rgba(0, 0, 0, 0.12);
            --radius-small: 6px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-large);
            box-shadow: var(--shadow-strong);
            padding: 2.5rem;
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        .message {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .status-icon.success {
            color: var(--success-color);
        }

        .status-icon.error {
            color: var(--danger-color);
        }

        .status-icon.warning {
            color: var(--warning-color);
        }

        .details-card {
            background: var(--bg-main);
            border-radius: var(--radius-medium);
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: left;
            border: 1px solid var(--border-light);
        }

        .details-card p {
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .details-card strong {
            color: var(--primary-color);
        }

        .loading-spinner {
            display: none;
            margin: 2rem auto;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            .title {
                font-size: 1.8rem;
            }
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">QRコード検証結果</h1>
        <div id="loading" class="loading-spinner"></div>
        <div id="result-content" style="display: none;">
            <div id="status-icon" class="status-icon"></div>
            <p id="status-message" class="message"></p>
            <div id="reservation-details" class="details-card" style="display: none;">
                <p><strong>予約ID:</strong> <span id="detail-id"></span></p>
                <p><strong>お名前:</strong> <span id="detail-name"></span></p>
                <p><strong>連絡先:</strong> <span id="detail-contact"></span></p>
                <p><strong>招待コード:</strong> <span id="detail-invite-code"></span></p>
                <p><strong>ステータス:</strong> <span id="detail-status"></span></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = ".";

        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const reservationId = urlParams.get("id");

            const loadingSpinner = document.getElementById("loading");
            const resultContent = document.getElementById("result-content");
            const statusIcon = document.getElementById("status-icon");
            const statusMessage = document.getElementById("status-message");
            const reservationDetails = document.getElementById("reservation-details");
            const detailId = document.getElementById("detail-id");
            const detailName = document.getElementById("detail-name");
            const detailContact = document.getElementById("detail-contact");
            const detailInviteCode = document.getElementById("detail-invite-code");
            const detailStatus = document.getElementById("detail-status");

            loadingSpinner.style.display = "block";
            resultContent.style.display = "none";

            if (!reservationId) {
                statusIcon.className = "status-icon error";
                statusIcon.innerHTML = "&#x2716;"; // Cross mark
                statusMessage.textContent = "無効なQRコードです。予約IDが見つかりません。";
                loadingSpinner.style.display = "none";
                resultContent.style.display = "block";
                return;
            }

            try {
                // QRコード検証APIは管理者画面からのみ呼び出される想定のため、ここでは直接予約情報を取得
                // ただし、このページはゲストがQRコードをスキャンした際に表示されるため、
                // ゲストが直接アクセスした場合は認証なしで予約情報を表示する。これはセキュリティリスクになりうる。
                // 適切な認証・認可を導入するか、このページは管理者のみがアクセスできるようにするべき。
                // 今回は、簡易的な表示として、認証なしで情報を取得する。
                const response = await fetch(`${API_BASE_URL}/api/reservations/${reservationId}`); // 認証なしでアクセスできるAPIエンドポイントが必要
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || "予約情報の取得に失敗しました。");
                }

                // 予約情報表示
                detailId.textContent = data.id;
                detailName.textContent = data.name;
                detailContact.textContent = data.contact;
                detailInviteCode.textContent = data.invite_code;
                detailStatus.textContent = getStatusText(data.status);
                reservationDetails.style.display = "block";

                if (data.status === "checked-in") {
                    statusIcon.className = "status-icon warning";
                    statusIcon.innerHTML = "&#x26A0;"; // Warning sign
                    statusMessage.textContent = "このQRコードは既に入場済みです。";
                } else if (data.status === "pending") {
                    statusIcon.className = "status-icon success";
                    statusIcon.innerHTML = "&#x2714;"; // Check mark
                    statusMessage.textContent = "有効なQRコードです。ご入場いただけます。";
                } else if (data.status === "cancelled") {
                    statusIcon.className = "status-icon error";
                    statusIcon.innerHTML = "&#x2716;"; // Cross mark
                    statusMessage.textContent = "この予約はキャンセルされています。";
                } else {
                    statusIcon.className = "status-icon error";
                    statusIcon.innerHTML = "&#x2716;"; // Cross mark
                    statusMessage.textContent = "予約ステータスが不明です。";
                }

            } catch (error) {
                console.error("QRコード検証エラー:", error);
                statusIcon.className = "status-icon error";
                statusIcon.innerHTML = "&#x2716;"; // Cross mark
                statusMessage.textContent = `検証中にエラーが発生しました: ${error.message}`; // エラーメッセージを詳細化
            } finally {
                loadingSpinner.style.display = "none";
                resultContent.style.display = "block";
            }
        });

        function getStatusText(status) {
            switch (status) {
                case "pending": return "保留中";
                case "checked-in": return "入場済み";
                case "cancelled": return "キャンセル";
                default: return "不明";
            }
        }
    </script>
</body>
</html>
