<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梨花祭2025 生徒ダッシュボード</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- QRコード生成ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        .tab-bar {
            display: flex;
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 4px;
            margin-bottom: 1.5rem;
            gap: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 0.55rem 0;
            border: none;
            border-radius: calc(var(--radius-md) - 4px);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--color-text-sub);
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active {
            background: var(--color-primary);
            color: #fff;
        }
        .slot-card {
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .slot-info { flex: 1; text-align: left; }
        .slot-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; }
        .slot-status { font-size: 0.8rem; }
        .slot-status.used { color: var(--color-error); }
        .slot-status.unused { color: var(--color-success); }
        .btn-copy {
            padding: 0.4rem 0.85rem;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s;
        }
        .btn-copy:hover { background: var(--color-primary); color: #fff; }
        .btn-copy.copied { background: var(--color-success); border-color: var(--color-success); color: #fff; }
        .count-badge {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            border-radius: 50px;
            padding: 0.2rem 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }
        .add-guest-form {
            background: var(--color-bg);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            text-align: left;
        }
        .add-guest-form input { width: 100%; margin-bottom: 0.75rem; }

        /* チケット画像表示用モーダル */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
            backdrop-filter: blur(8px);
        }
        .modal-overlay.is-active { display: flex; }
        .modal-container {
            max-width: 90%;
            max-height: 80vh;
            position: relative;
            background: #fff;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .modal-image {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .modal-footer {
            width: 100%;
            padding: 1rem;
            background: #fff;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }
        .modal-close {
            position: absolute;
            top: 10px; right: 10px;
            width: 32px; height: 32px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.25rem;
            z-index: 1001;
        }
    </style>
</head>
<body class="landing-page">
    <div class="glass-card slide-up" style="max-width: 500px; margin: 0 auto;">

        <!-- ===== ログイン画面 ===== -->
        <div id="page-login">
            <h1 class="title">梨花祭2025</h1>
            <p class="subtitle">生徒ダッシュボード</p>

            <!-- タブ切り替え -->
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
                <button class="tab-btn" id="tab-register" onclick="switchTab('register')">新規登録</button>
            </div>

            <!-- ログインフォーム（メールのみ） -->
            <div id="form-login" class="fade-in">
                <div class="form-group">
                    <label class="form-label" for="login-email">学校メールアドレス</label>
                    <input class="form-input" type="email" id="login-email" placeholder="xxxx@biblos.ac.jp" autocomplete="email">
                </div>
                <p id="login-error" class="help is-danger" style="display:none;"></p>
                <button class="btn btn-primary" style="width:100%;" onclick="sendLoginOtp()">認証コードを送信</button>
            </div>

            <!-- 新規登録フォーム（メール+名前） -->
            <div id="form-register" class="fade-in" style="display:none;">
                <div class="form-group">
                    <label class="form-label" for="reg-email">学校メールアドレス</label>
                    <input class="form-input" type="email" id="reg-email" placeholder="xxxx@biblos.ac.jp" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-name">氏名</label>
                    <input class="form-input" type="text" id="reg-name" placeholder="例: 山田 太郎">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-grade-class">学年・クラス</label>
                    <select class="form-input" id="reg-grade-class" style="appearance: auto; padding-right: 2rem;">
                        <option value="">選択してください</option>
                    </select>
                </div>
                <p id="register-error" class="help is-danger" style="display:none;"></p>
                <button class="btn btn-primary" style="width:100%;" onclick="sendRegisterOtp()">認証コードを送信</button>
            </div>

            <!-- OTP入力（共通） -->
            <div id="step-otp" class="fade-in" style="display:none;">
                <p style="margin-bottom: 1rem; color: var(--color-text-sub);">
                    <span id="otp-email-display" style="font-weight:700;"></span> に<br>6桁の認証コードを送信しました。
                </p>
                <div class="form-group">
                    <label class="form-label" for="input-otp">認証コード（6桁）</label>
                    <input class="form-input" type="text" id="input-otp" placeholder="123456" maxlength="6" inputmode="numeric">
                </div>
                <p id="otp-error" class="help is-danger" style="display:none;"></p>
                <div style="display:flex; gap:0.75rem;">
                    <button class="btn" style="flex:1; background: var(--color-bg); color: var(--color-text);" onclick="backToForm()">戻る</button>
                    <button class="btn btn-primary" style="flex:2;" onclick="verifyOtp()">ログイン</button>
                </div>
            </div>

            <!-- 処理中インジケーター -->
            <div id="step-loading" style="display:none; text-align:center; padding: 1rem 0;">
                <div class="loader" style="margin: 0 auto 1rem;"></div>
                <p style="color: var(--color-text-sub); font-size:0.9rem;">処理中...</p>
            </div>
        </div>

        <!-- ===== ダッシュボード ===== -->
        <div id="page-dashboard" style="display:none;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:1.25rem; gap: 1rem;">
                <div style="flex: 1; word-wrap: break-word;">
                    <h1 class="title" style="font-size: 1.4rem; margin:0; text-align: left;">梨花祭2025</h1>
                    <p id="dash-name" style="color: var(--color-text-sub); margin:0; font-size:0.9rem; line-height: 1.4;"></p>
                </div>
                <button class="btn" style="padding: 0.4rem 0.85rem; font-size:0.8rem; background: var(--color-bg); color: var(--color-text-sub); flex-shrink: 0; width: auto;" onclick="logout()">ログアウト</button>
            </div>

            <p class="subtitle" style="text-align:left; margin-bottom: 0.5rem;">招待リンク管理</p>
            <p id="dash-count-label" class="count-badge"></p>

            <div id="slots-container"></div>

            <div id="add-guest-section">
                <div class="add-guest-form">
                    <label class="form-label" for="input-guest-name">ゲストの名前を入力して招待リンクを作成</label>
                    <input class="form-input" type="text" id="input-guest-name" placeholder="例: 鈴木 花子">
                    <p id="add-error" class="help is-danger" style="display:none;"></p>
                    <button class="btn btn-primary" style="width:100%;" id="btn-add-guest" onclick="addGuest()">招待リンクを生成</button>
                </div>
            </div>

            <p id="limit-notice" style="display:none; color: var(--color-text-sub); font-size:0.85rem; margin-top:0.5rem;">
                招待枠をすべて使用しました。
            </p>

            <p style="margin-top: 1.5rem; font-size: 0.8rem; color: var(--color-text-sub);">
                ※ 招待リンクをゲストに送ってください。ゲストはリンクを開くだけで入場QRが表示されます。
            </p>
        </div>

    </div>

    <!-- チケット画像モーダル -->
    <div id="ticket-modal" class="modal-overlay">
        <div class="modal-container">
            <button class="modal-close" onclick="closeTicketModal()">&times;</button>
            <img id="modal-ticket-img" class="modal-image" src="" alt="デジタルチケット">
            <div class="modal-footer">
                <p style="color: #333; font-size: 0.85rem; margin: 0;">画像を長押しして保存するか、<br>下のボタンからダウンロードしてください。</p>
                <a id="modal-download-link" class="btn btn-primary" style="width: 100%; text-decoration: none; text-align: center;" download="">画像をダウンロード</a>
            </div>
        </div>
    </div>

    <script>
        let studentToken = localStorage.getItem('student_token') || '';
        let studentEmail = localStorage.getItem('student_email') || '';
        let maxSlots = 3;
        let currentTab = 'login'; // 'login' | 'register'
        let currentMessageTemplate = ''; // テンプレート保存用

        // ===== 初期化 =====
        window.addEventListener('DOMContentLoaded', () => {
            populateGradeClassOptions();
            if (studentToken) loadDashboard();
        });

        // 学年クラスの選択肢を動的生成
        function populateGradeClassOptions() {
            const select = document.getElementById('reg-grade-class');
            for (let grade = 1; grade <= 3; grade++) {
                for (let cls = 1; cls <= 12; cls++) {
                    const opt = document.createElement('option');
                    opt.value = `${grade}-${cls}`;
                    opt.textContent = `${grade}年${cls}組`;
                    select.appendChild(opt);
                }
                ['E1', 'E2'].forEach(cls => {
                    const opt = document.createElement('option');
                    opt.value = `${grade}-${cls}`;
                    opt.textContent = `${grade}年${cls}組`;
                    select.appendChild(opt);
                });
            }
        }

        // ===== タブ切り替え =====
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
            clearErrors();
        }

        function clearErrors() {
            ['login-error', 'register-error', 'otp-error'].forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.style.display = 'none'; el.textContent = ''; }
            });
        }

        // ===== ログイン（メールのみ）=====
        async function sendLoginOtp() {
            const email = document.getElementById('login-email').value.trim();
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';

            if (!email) {
                errEl.textContent = 'メールアドレスを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/login-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok) {
                    studentEmail = email;
                    document.getElementById('otp-email-display').textContent = email;
                    showOtpStep();
                } else {
                    errEl.textContent = data.message || 'エラーが発生しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        // ===== 新規登録（メール+名前）=====
        async function sendRegisterOtp() {
            const email = document.getElementById('reg-email').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const grade_class = document.getElementById('reg-grade-class').value;
            const errEl = document.getElementById('register-error');
            errEl.style.display = 'none';

            if (!email || !name || !grade_class) {
                errEl.textContent = 'メールアドレス、氏名、学年クラスを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, name, grade_class })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok) {
                    studentEmail = email;
                    document.getElementById('otp-email-display').textContent = email;
                    showOtpStep();
                } else {
                    errEl.textContent = data.message || 'エラーが発生しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        function showOtpStep() {
            document.getElementById('form-login').style.display = 'none';
            document.getElementById('form-register').style.display = 'none';
            document.getElementById('tab-bar') && (document.querySelector('.tab-bar').style.display = 'none');
            document.getElementById('step-otp').style.display = 'block';
        }

        // ===== OTP検証 =====
        async function verifyOtp() {
            const otp = document.getElementById('input-otp').value.trim();
            const errEl = document.getElementById('otp-error');
            errEl.style.display = 'none';

            if (!otp || otp.length !== 6) {
                errEl.textContent = '6桁の認証コードを入力してください。';
                errEl.style.display = 'block';
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/student/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: studentEmail, otp })
                });
                const data = await res.json();
                setLoading(false);

                if (res.ok && data.success) {
                    studentToken = data.token;
                    localStorage.setItem('student_token', studentToken);
                    localStorage.setItem('student_email', studentEmail);
                    loadDashboard();
                } else {
                    errEl.textContent = data.message || '認証に失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                setLoading(false);
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            }
        }

        // ===== ダッシュボード読み込み =====
        async function loadDashboard() {
            try {
                const res = await fetch('/api/student/dashboard', {
                    headers: { 'Authorization': `Bearer ${studentToken}` }
                });
                if (res.status === 401 || res.status === 403) { logout(); return; }
                const data = await res.json();
                maxSlots = data.maxSlots || 3;

                document.getElementById('page-login').style.display = 'none';
                document.getElementById('page-dashboard').style.display = 'block';
                document.getElementById('dash-name').textContent = `${data.name} さん${data.grade_class ? ' (' + data.grade_class + ')' : ''}`;
                renderSlots(data.slots);
            } catch (e) {
                console.error('ダッシュボード読み込みエラー:', e);
                logout();
            }
        }

        function renderSlots(slots) {
            const container = document.getElementById('slots-container');
            const addSection = document.getElementById('add-guest-section');
            const limitNotice = document.getElementById('limit-notice');
            const countLabel = document.getElementById('dash-count-label');
            const baseUrl = `${location.protocol}//${location.host}`;

            countLabel.textContent = `${slots.length} / ${maxSlots} 枠使用中`;
            container.innerHTML = '';

            if (slots.length === 0) {
                container.innerHTML = '<p style="color: var(--color-text-sub); font-size: 0.9rem; margin-bottom: 1rem;">まだ招待リンクはありません。</p>';
            }

            slots.forEach((slot, i) => {
                const url = `${baseUrl}/?token=${slot.token}`;
                const div = document.createElement('div');
                div.className = 'slot-card';
                div.style.flexDirection = 'column';
                div.style.alignItems = 'stretch';
                
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
                        <div class="slot-info">
                            <div class="slot-name">${escHtml(slot.guest_name)} 様</div>
                            <div class="slot-status ${slot.used ? 'used' : 'unused'}">
                                ${slot.used ? '✅ 使用済み' : '⏳ 未使用'}
                            </div>
                        </div>
                        ${!slot.used ? `<button class="btn" style="padding: 0.2rem 0.6rem; font-size: 0.75rem; background: var(--color-bg); color: var(--color-text-sub); width:auto;" onclick="editGuestName('${slot.id}', '${escHtml(slot.guest_name)}')">名前変更</button>` : ''}
                    </div>
                    ${!slot.used
                        ? `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                               <button class="btn-copy" id="copy-btn-${i}" onclick="copyLink('${escHtml(url)}', ${i}, '${escHtml(slot.guest_name)}')">📋 コピー</button>
                               <button class="btn-copy btn-line" style="border:none;" onclick="shareLine('${escHtml(url)}', '${escHtml(slot.guest_name)}')">LINE送る</button>
                           </div>
                           <button class="btn-copy" style="width:100%; margin-top:0.5rem; background: var(--color-bg); color: var(--color-primary); border: 1px dotted var(--color-primary); font-weight: 500;" onclick="downloadTicketImage('${escHtml(url)}', '${escHtml(slot.guest_name)}')">🎟️ チケット画像を保存</button>`
                        : '<div style="background:#f3f4f6; color:#9ca3af; text-align:center; padding:0.5rem; border-radius:8px; font-size:0.8rem;">ご入場ありがとうございました</div>'
                    }
                `;
                container.appendChild(div);
            });

            if (slots.length >= maxSlots) {
                addSection.style.display = 'none';
                limitNotice.style.display = 'block';
            } else {
                addSection.style.display = 'block';
                limitNotice.style.display = 'none';
            }
        }

        // ===== 招待リンク生成 =====
        async function addGuest() {
            const guestName = document.getElementById('input-guest-name').value.trim();
            const errEl = document.getElementById('add-error');
            errEl.style.display = 'none';

            if (!guestName) {
                errEl.textContent = 'ゲストの名前を入力してください。';
                errEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btn-add-guest');
            btn.disabled = true;
            btn.textContent = '生成中...';

            try {
                const res = await fetch('/api/student/generate-links', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${studentToken}`
                    },
                    body: JSON.stringify({ guest_name: guestName })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('input-guest-name').value = '';
                    await loadDashboard();
                } else {
                    errEl.textContent = data.message || '生成に失敗しました。';
                    errEl.style.display = 'block';
                }
            } catch (e) {
                errEl.textContent = 'サーバーとの通信に失敗しました。';
                errEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '招待リンクを生成';
            }
        }

        // ===== 名前編集 =====
        async function editGuestName(id, currentName) {
            const newName = prompt('新しい名前を入力してください:', currentName);
            if (newName !== null && newName.trim() !== '' && newName !== currentName) {
                try {
                    const res = await fetch(`/api/student/guest-slots/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${studentToken}`
                        },
                        body: JSON.stringify({ guest_name: newName.trim() })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        showNotification('名前を変更しました', 'success');
                        await loadDashboard();
                    } else {
                        showNotification(data.message || '更新に失敗しました。', 'error');
                    }
                } catch (e) {
                    showNotification('サーバーエラーが発生しました。', 'error');
                }
            }
        }

        function createMessage(url, guestName) {
            return `梨花祭にご招待します！ ${guestName} 様の入場チケットはこちらです。\n\n【入場用URL】\n${url}`;
        }

        // ===== コピー =====
        async function copyLink(url, idx, guestName) {
            const textToCopy = createMessage(url, guestName);
            try {
                await navigator.clipboard.writeText(textToCopy);
                const btn = document.getElementById(`copy-btn-${idx}`);
                if (btn) {
                    btn.textContent = 'コピー済み！';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
                }
            } catch (e) {
                prompt('以下のテキストをコピーしてください:', textToCopy);
            }
        }

        function shareLine(url, guestName) {
            const text = createMessage(url, guestName);
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
            window.open(lineUrl, '_blank');
        }

        // ===== デジタルチケット画像生成 (Canvas) =====
        async function downloadTicketImage(url, guestName) {
            showNotification('チケット画像を生成中...', 'info');
            
            try {
                // QRコードをデータURLとして生成
                const qrDataUrl = await QRCode.toDataURL(url, {
                    width: 300,
                    margin: 1,
                    color: { dark: '#111827', light: '#ffffff' }
                });

                // Canvasの準備 (800x1200 の縦長サイズ)
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 1200;
                const ctx = canvas.getContext('2d');

                // 背景グラデーション
                const gradient = ctx.createLinearGradient(0, 0, 800, 1200);
                gradient.addColorStop(0, '#4f46e5'); // Indigo
                gradient.addColorStop(1, '#ec4899'); // Pink
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 800, 1200);

                // 背景の装飾 (円形)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                ctx.beginPath(); ctx.arc(100, 100, 300, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(700, 1000, 400, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(800, 300, 200, 0, Math.PI * 2); ctx.fill();

                // 中央の白いチケットエリア
                const cardWidth = 660;
                const cardHeight = 940;
                const cardX = (800 - cardWidth) / 2;
                const cardY = (1200 - cardHeight) / 2;

                // 影
                ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
                ctx.shadowBlur = 30;
                ctx.shadowOffsetY = 15;
                
                // 白背景 (角丸対応のため自分で描画するか roundRect 使用)
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(cardX, cardY, cardWidth, cardHeight, 30);
                } else {
                    ctx.rect(cardX, cardY, cardWidth, cardHeight); // fallback
                }
                ctx.fill();

                // 影をリセット
                ctx.shadowColor = 'transparent';

                // 切り取り線（ミシン目）
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 4;
                ctx.setLineDash([15, 10]);
                ctx.beginPath();
                ctx.moveTo(cardX, cardY + 680);
                ctx.lineTo(cardX + cardWidth, cardY + 680);
                ctx.stroke();
                ctx.setLineDash([]); // リセット

                // --- テキスト描画 ---
                ctx.textAlign = 'center';
                
                // ヘッダー: 梨花祭 2025
                ctx.fillStyle = '#1e1b4b';
                ctx.font = 'bold 54px "Noto Sans JP", sans-serif';
                ctx.fillText('梨花祭 2025', 400, cardY + 110);

                // サブタイトル
                ctx.font = 'bold 28px "Inter", sans-serif';
                ctx.fillStyle = '#6366f1';
                ctx.fillText('SPECIAL GUEST TICKET', 400, cardY + 165);

                // ゲスト名
                ctx.fillStyle = '#111827';
                ctx.font = 'bold 56px "Noto Sans JP", sans-serif';
                const displayName = guestName.length > 12 ? guestName.substring(0, 12) + '…' : guestName;
                ctx.fillText(displayName + ' 様', 400, cardY + 300);

                // --- QRコード描画 ---
                const qrImg = new Image();
                qrImg.src = qrDataUrl;
                await new Promise(resolve => qrImg.onload = resolve);
                
                const qrSize = 270;
                const qrX = (800 - qrSize) / 2;
                const qrY = cardY + 350;
                
                // QRコードの下に薄い枠線を敷く
                ctx.strokeStyle = '#f3f4f6';
                ctx.lineWidth = 2;
                ctx.strokeRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 20);
                ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

                // --- フッター（インフォメーション） ---
                ctx.fillStyle = '#4b5563';
                ctx.font = 'bold 26px "Noto Sans JP", sans-serif';
                ctx.fillText('当日はこのQRコードをご提示ください', 400, cardY + 740);
                
                ctx.font = '24px "Noto Sans JP", sans-serif';
                ctx.fillText('開催日: 2025年6月◯日（土）9:00〜14:00', 400, cardY + 810);
                ctx.fillText('場所: 千葉英和高等学校', 400, cardY + 860);

                // 注意書き
                ctx.fillStyle = '#9ca3af';
                ctx.font = '18px "Noto Sans JP", sans-serif';
                ctx.fillText('※このチケットは1回のみ有効です', 400, cardY + 900);

                // Canvasを画像データへ変換してモーダルに表示
                const dataUrl = canvas.toDataURL('image/png');
                const modalImg = document.getElementById('modal-ticket-img');
                const downloadLink = document.getElementById('modal-download-link');
                const modal = document.getElementById('ticket-modal');

                modalImg.src = dataUrl;
                downloadLink.href = dataUrl;
                downloadLink.download = `梨花祭チケット_${guestName}.png`;
                
                modal.classList.add('is-active');
                showNotification('チケット画像を生成しました', 'success');
            } catch (err) {
                console.error("画像生成エラー:", err);
                showNotification('画像の生成に失敗しました', 'error');
            }
        }

        function closeTicketModal() {
            document.getElementById('ticket-modal').classList.remove('is-active');
        }

        // ===== ユーティリティ =====
        function showNotification(message, type = 'success') {
            // 表示済みのものを消去（重ならないようにする）
            document.querySelectorAll('.notification').forEach(el => el.remove());
            
            const div = document.createElement('div');
            div.className = `notification is-${type}`;
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => {
                if (div.parentNode) div.parentNode.removeChild(div);
            }, 3000);
        }

        function backToForm() {
            document.getElementById('step-otp').style.display = 'none';
            document.querySelector('.tab-bar').style.display = 'flex';
            switchTab(currentTab);
        }

        function setLoading(on) {
            document.getElementById('step-loading').style.display = on ? 'block' : 'none';
            if (on) {
                document.getElementById('form-login').style.display = 'none';
                document.getElementById('form-register').style.display = 'none';
                document.getElementById('step-otp').style.display = 'none';
            } else {
                if (document.getElementById('step-otp').style.display === 'none' && document.getElementById('page-dashboard').style.display === 'none') {
                    document.getElementById('form-login').style.display = currentTab === 'login' ? 'block' : 'none';
                    document.getElementById('form-register').style.display = currentTab === 'register' ? 'block' : 'none';
                }
            }
        }

        function logout() {
            localStorage.removeItem('student_token');
            localStorage.removeItem('student_email');
            studentToken = '';
            document.getElementById('page-dashboard').style.display = 'none';
            document.getElementById('page-login').style.display = 'block';
            document.querySelector('.tab-bar').style.display = 'flex';
            switchTab('login');
            setLoading(false);
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>

    <footer style="text-align: center; margin-top: 2rem; padding: 1rem;">
        <p style="color: var(--color-text-sub); font-size: 12px;">&copy; 2025 千葉英和高校梨花祭運営委員</p>
    </footer>
